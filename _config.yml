# ===================== 文件读取规则 =====================
include:
  - .htaccess
  - _pages
  - files
exclude:
  - docs
  - google_scholar_crawler
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - .github
  - CHANGELOG
  - Capfile
  - Gemfile
  - Gemfile.lock
  - Gruntfile.js
  - LICENSE
  - README
  - Rakefile
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - config
  - gulpfile.js
  - log
  - node_modules
  - package.json
  - package-lock.json
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# ===================== Markdown 渲染配置 =====================
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# ===================== 页面默认布局 =====================
defaults:
  # 所有页面默认使用 default 布局、展示个人资料栏
  - scope:
      path: ""
      type: pages
    values:
      layout: default
      author_profile: true

# ===================== Sass 样式编译 =====================
sass:
  sass_dir: _sass
  style: compressed  # 编译为压缩CSS，提升加载速度

# ===================== 链接与时区 =====================
permalink: /:categories/:title/
timezone: Asia/Shanghai  # 时区设为北京时间，无需修改

# ===================== 插件配置 =====================
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji

# ===================== HTML 压缩配置 =====================
# 本地开发环境关闭压缩，线上自动开启，兼顾调试与访问速度
compress_html:
  clippings: all
  comments: ["<!-- ", " -->"]
  endings: all
  blanklines: false
  profile: false
  startings: []
  ignore:
    envs: development
